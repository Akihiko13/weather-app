<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天気予報</title>
<style>
  /* 天気で背景色を滑らかに変えるため、色をアニメ可能なカスタムプロパティにする */
  @property --bg1 { syntax: '<color>'; inherits: false; initial-value: #4facfe; }
  @property --bg2 { syntax: '<color>'; inherits: false; initial-value: #00c6fb; }
  :root {
    --card-bg: rgba(255, 255, 255, 0.92);
    --text-main: #1a1a2e;
    --text-sub: #555;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    --bg1: #4facfe;
    --bg2: #00c6fb;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    transition: --bg1 0.7s ease, --bg2 0.7s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .container {
    width: 100%;
    max-width: 440px;
  }
  /* PCなど広い画面では横に広げて市町村を3列に */
  @media (min-width: 760px) {
    .container { max-width: 880px; }
  }
  /* 市町村カードのグリッド: スマホ2列 → PC3列(3×2) */
  .mgrid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  @media (min-width: 760px) {
    .mgrid { grid-template-columns: repeat(3, 1fr); }
  }
  .mgrid .mcard { margin-bottom: 0; }
  .summary { text-align: center; }
  .day-header {
    text-align: center;
    color: rgba(255,255,255,0.95);
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 14px;
  }
  /* 市町村ごとのカード */
  .mcard {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 16px 18px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.18);
    backdrop-filter: blur(10px);
    margin-bottom: 12px;
    text-align: left;
  }
  .mcard-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .mcard .m-name {
    font-size: 20px;
    font-weight: 800;
    color: var(--text-main);
  }
  .mcard .m-cond {
    font-size: 12px;
    color: var(--text-sub);
    margin-top: 2px;
  }
  .mcard .m-icon { width: 58px; height: 58px; flex: 0 0 auto; }
  .mcard .m-icon .wi { width: 58px; height: 58px; }
  .mcard .m-temp {
    font-size: 40px;
    font-weight: 800;
    color: var(--text-main);
    line-height: 1;
    margin: 6px 0 12px;
  }
  .mcard .m-temp span { font-size: 20px; font-weight: 600; vertical-align: super; }
  .mcard .m-metrics {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    padding-top: 12px;
    border-top: 1px solid rgba(0,0,0,0.08);
  }
  .mcard .m-metrics > div {
    font-size: 12px;
    color: var(--text-sub);
  }
  .mcard .m-metrics strong {
    display: block;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-main);
    margin-top: 2px;
  }
  /* 市町村カード(グリッド内・コンパクト) */
  .mcity { padding: 14px 14px; }
  .mcity .m-name { font-size: 17px; }
  .mcity .m-temp { font-size: 34px; margin: 4px 0 10px; }
  .mcity .m-temp span { font-size: 17px; }
  .mcity .m-metrics { gap: 12px; }
  .card {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 32px 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    text-align: center;
    backdrop-filter: blur(10px);
  }
  .city-name {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-sub);
    margin: 0 0 4px;
  }
  .date {
    font-size: 13px;
    color: #999;
    margin: 0 0 16px;
  }
  .emoji {
    font-size: 88px;
    line-height: 1;
    margin: 8px 0;
  }
  /* アニメーション天気アイコン */
  .wicon { margin: 6px auto 4px; width: 108px; height: 108px; }
  .wi { width: 108px; height: 108px; display: block; }
  .wi .spin { animation: wi-spin 14s linear infinite; transform-box: fill-box; transform-origin: center; }
  .wi .pulse { animation: wi-pulse 3s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
  .wi .cloud { animation: wi-bob 4s ease-in-out infinite; }
  .wi .drop { animation: wi-fall 1.3s linear infinite; }
  .wi .bolt { animation: wi-flash 2.4s ease-in-out infinite; }
  .wi .flake { animation: wi-snow 2.4s linear infinite; transform-box: fill-box; transform-origin: center; }
  .wi .fogline { animation: wi-drift 3s ease-in-out infinite; }
  @keyframes wi-spin { to { transform: rotate(360deg); } }
  @keyframes wi-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.09); } }
  @keyframes wi-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  @keyframes wi-fall { 0% { transform: translateY(-3px); opacity: 0; } 25% { opacity: 1; } 100% { transform: translateY(12px); opacity: 0; } }
  @keyframes wi-flash { 0%,42%,58%,100% { opacity: .2; } 48%,52% { opacity: 1; } }
  @keyframes wi-snow { 0% { transform: translateY(-3px) rotate(0); opacity: 0; } 25% { opacity: 1; } 100% { transform: translateY(13px) rotate(160deg); opacity: 0; } }
  @keyframes wi-drift { 0%,100% { transform: translateX(-3px); } 50% { transform: translateX(3px); } }
  @media (prefers-reduced-motion: reduce) {
    .wi * { animation: none !important; }
  }
  .condition {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-main);
    margin: 4px 0 20px;
  }
  .temp {
    font-size: 64px;
    font-weight: 800;
    color: var(--text-main);
    line-height: 1;
    margin: 0;
  }
  .temp span {
    font-size: 32px;
    font-weight: 600;
    vertical-align: super;
  }
  .subrow {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid rgba(0,0,0,0.08);
  }
  .subrow div {
    font-size: 13px;
    color: var(--text-sub);
  }
  .subrow strong {
    display: block;
    font-size: 18px;
    color: var(--text-main);
    margin-top: 2px;
  }
  .hourly-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sub);
    margin: 22px 0 10px;
    text-align: left;
  }
  .hourly {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 6px;
    margin: 0 -4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }
  .hourly-cell {
    flex: 0 0 auto;
    min-width: 52px;
    text-align: center;
    padding: 8px 4px;
    border-radius: 12px;
    background: rgba(0,0,0,0.03);
  }
  .hourly-cell .h-time {
    font-size: 12px;
    color: var(--text-sub);
  }
  .hourly-cell .h-emoji {
    font-size: 24px;
    margin: 4px 0;
    line-height: 1;
  }
  .hourly-cell .h-temp {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-main);
  }
  .hourly-cell .h-pop {
    font-size: 10px;
    color: #4a90d9;
    margin-top: 2px;
  }
  .loading, .error {
    color: var(--text-sub);
    font-size: 15px;
    padding: 40px 0;
  }
  .error { color: #d63031; }
  .updated {
    text-align: center;
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    margin-top: 14px;
  }
</style>
</head>
<body>
<div class="container">
  <div id="card">
    <div class="mcard"><div class="loading">読み込み中...</div></div>
  </div>
  <div class="updated" id="updated"></div>
</div>

<script>
// 気象庁(JMA)公式データを使用。
// 天気・降水確率は香川県(370000)共通。気温は各市町村のアメダス地点から取得する。
const KAGAWA_FORECAST = '370000';
const CITIES = {
  takamatsu:     { name: '高松',   amedasId: '72086' }, // 高松
  marugame:      { name: '丸亀',   amedasId: '72111' }, // 多度津(丸亀の隣)
  ayagawa:       { name: '綾川',   amedasId: '72121' }, // 滝宮
  shodoshima:    { name: '小豆島', amedasId: '72061' }, // 内海
  mitoyo:        { name: '三豊',   amedasId: '72161' }, // 財田
  higashikagawa: { name: '東かがわ', amedasId: '72146' }, // 引田
};

// 降水確率から時間帯ブロックの絵文字を決める（天気は半日単位のため確率で補完）
function popEmoji(pop, dayEmoji) {
  if (pop >= 70) return '🌧️';
  if (pop >= 40) return '🌦️';
  if (pop >= 20) return '⛅';
  return dayEmoji;
}

function weatherEmoji(text) {
  if (!text) return '❓';
  if (text.includes('雷')) return '⛈️';
  if (text.includes('雪')) return '❄️';
  if (text.includes('雨') && text.includes('晴')) return '🌦️';
  if (text.includes('雨') && text.includes('くもり')) return '🌧️';
  if (text.includes('雨')) return '🌧️';
  if (text.includes('晴') && text.includes('くもり')) return '⛅';
  if (text.includes('晴')) return '☀️';
  if (text.includes('くもり')) return '☁️';
  if (text.includes('霧')) return '🌫️';
  return '❓';
}

// アニメーション天気アイコン（SVG + CSS）用パーツ
const SVG_SUN = `<g class="spin"><g stroke="#FFB300" stroke-width="5" stroke-linecap="round">
  <line x1="54" y1="19" x2="54" y2="8"/><line x1="73.1" y1="26.9" x2="80.9" y2="19.1"/>
  <line x1="81" y1="46" x2="92" y2="46"/><line x1="73.1" y1="65.1" x2="80.9" y2="72.9"/>
  <line x1="54" y1="73" x2="54" y2="84"/><line x1="34.9" y1="65.1" x2="27.1" y2="72.9"/>
  <line x1="27" y1="46" x2="16" y2="46"/><line x1="34.9" y1="26.9" x2="27.1" y2="19.1"/>
</g></g><circle class="pulse" cx="54" cy="46" r="17" fill="#FFD54F"/>`;
const SVG_CLOUD = `<g class="cloud" fill="#e6ecf3">
  <ellipse cx="40" cy="60" rx="18" ry="15"/><ellipse cx="64" cy="56" rx="21" ry="18"/>
  <rect x="30" y="58" width="50" height="18" rx="9"/></g>`;
const SVG_RAIN = `<g stroke="#4a90d9" stroke-width="4" stroke-linecap="round">
  <line class="drop" x1="43" y1="80" x2="41" y2="88" style="animation-delay:0s"/>
  <line class="drop" x1="55" y1="80" x2="53" y2="88" style="animation-delay:.45s"/>
  <line class="drop" x1="67" y1="80" x2="65" y2="88" style="animation-delay:.9s"/></g>`;
const SVG_BOLT = `<polygon class="bolt" fill="#FFC107" points="56,72 44,92 53,92 47,104 68,84 58,84 63,72"/>`;
const SVG_SNOW = `<g fill="#eaf2ff">
  <circle class="flake" cx="42" cy="82" r="3.5" style="animation-delay:0s"/>
  <circle class="flake" cx="55" cy="82" r="3.5" style="animation-delay:.7s"/>
  <circle class="flake" cx="68" cy="82" r="3.5" style="animation-delay:1.3s"/></g>`;
const SVG_FOG = `<g class="cloud" fill="#e6ecf3"><ellipse cx="54" cy="48" rx="27" ry="18"/></g>
  <g stroke="#cfd8e3" stroke-width="5" stroke-linecap="round">
  <line class="fogline" x1="30" y1="76" x2="78" y2="76" style="animation-delay:0s"/>
  <line class="fogline" x1="34" y1="88" x2="74" y2="88" style="animation-delay:.6s"/></g>`;
const SUN_BEHIND = `<g transform="translate(-8,-14) scale(.62)">${SVG_SUN}</g>`;

// 天気テキスト → 背景グラデーション [上色, 下色]。白文字が読める中間トーンに調整
function weatherBg(text) {
  const t = text || '';
  if (t.includes('雷')) return ['#3a4453', '#59616e'];
  if (t.includes('雪')) return ['#6f94bb', '#a3c0d8'];
  if (t.includes('雨') && t.includes('晴')) return ['#5b7fa6', '#87a7c4'];
  if (t.includes('雨')) return ['#4b6373', '#6b8494'];
  if (t.includes('晴') && t.includes('くもり')) return ['#5b93c9', '#8fb8d8'];
  if (t.includes('晴')) return ['#2b8fe0', '#6fd0f5'];
  if (t.includes('くもり')) return ['#7d8a99', '#a7b3bf'];
  if (t.includes('霧')) return ['#87939d', '#aeb9c2'];
  return ['#4facfe', '#00c6fb'];
}

function weatherIcon(text) {
  const t = text || '';
  let body;
  if (t.includes('雷')) body = SVG_CLOUD + SVG_BOLT;
  else if (t.includes('雪')) body = SVG_CLOUD + SVG_SNOW;
  else if (t.includes('雨') && t.includes('晴')) body = SUN_BEHIND + SVG_CLOUD + SVG_RAIN;
  else if (t.includes('雨')) body = SVG_CLOUD + SVG_RAIN;
  else if (t.includes('晴') && t.includes('くもり')) body = SUN_BEHIND + SVG_CLOUD;
  else if (t.includes('晴')) body = SVG_SUN;
  else if (t.includes('くもり')) body = SVG_CLOUD;
  else if (t.includes('霧')) body = SVG_FOG;
  else body = SVG_CLOUD;
  return `<svg class="wi" viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg">${body}</svg>`;
}

const card = document.getElementById('card');
const updatedEl = document.getElementById('updated');
const cache = {};

async function fetchAmedasLatestFile() {
  const res = await fetch('https://www.jma.go.jp/bosai/amedas/data/latest_time.txt');
  if (!res.ok) throw new Error('アメダス最新時刻の取得に失敗');
  const text = (await res.text()).trim();
  const compact = text.split('+')[0].replace(/[-T:]/g, '');
  return `https://www.jma.go.jp/bosai/amedas/data/map/${compact}.json`;
}

function extractForecast(json) {
  const report = json[0];
  let weatherText = null;
  let tmax = null, tmin = null, stationCode = null;
  let popBlocks = [];
  for (const ts of report.timeSeries) {
    const area = ts.areas && ts.areas[0];
    if (!area) continue;
    if (weatherText === null && area.weathers) {
      weatherText = area.weathers[0];
    }
    // 降水確率(6時間ブロック)。timeDefinesの各時刻から6時間ぶんをそのブロックが担当
    if (!popBlocks.length && area.pops) {
      popBlocks = area.pops.map((v, i) => ({
        time: ts.timeDefines[i],
        pop: v === '' ? null : Number(v),
      }));
    }
    if (tmax === null && area.temps) {
      const nums = area.temps.map(v => (v === '' ? null : Number(v))).filter(v => v !== null && !Number.isNaN(v));
      if (nums.length >= 2) { tmin = Math.min(...nums.slice(0, 2)); tmax = Math.max(...nums.slice(0, 2)); }
      if (area.area && area.area.code) stationCode = area.area.code;
    }
  }
  return { weatherText, tmax, tmin, stationCode, popBlocks };
}

// 香川県内は天気・降水確率が共通なので予報は1回、アメダスも1回だけ取得し、
// 各市町村は自分のアメダス地点の現在気温だけ差し替える。
async function fetchAll() {
  const keys = Object.keys(CITIES);
  try {
    const forecastRes = await fetch(`https://www.jma.go.jp/bosai/forecast/data/forecast/${KAGAWA_FORECAST}.json`);
    if (!forecastRes.ok) throw new Error('予報データの取得に失敗');
    const shared = extractForecast(await forecastRes.json());

    // アメダス観測値（取れなくても予報は表示する）
    let amedasMap = null;
    try {
      const amedasUrl = await fetchAmedasLatestFile();
      const amedasRes = await fetch(amedasUrl);
      if (amedasRes.ok) amedasMap = await amedasRes.json();
    } catch (e) { /* 観測値なしで継続 */ }

    const num = a => (Array.isArray(a) && typeof a[0] === 'number') ? a[0] : null;
    keys.forEach(key => {
      const st = amedasMap && amedasMap[CITIES[key].amedasId];
      cache[key] = {
        weatherText: shared.weatherText,
        tmax: shared.tmax,
        tmin: shared.tmin,
        popBlocks: shared.popBlocks,
        currentTemp: st ? num(st.temp) : null,
        humidity: st ? num(st.humidity) : null,
        wind: st ? num(st.wind) : null,
      };
    });
    renderAll();
  } catch (e) {
    card.innerHTML = `<div class="mcard"><div class="error">天気情報の取得に失敗しました<br>${e.message}</div></div>`;
  }
}

// 各市町村ごとにカードを分けて、現在気温・最高・最低・風速・湿度を表示
function renderAll() {
  const keys = Object.keys(CITIES);
  const shared = keys.map(k => cache[k]).find(Boolean);
  if (!shared) return;

  const [bg1, bg2] = weatherBg(shared.weatherText);
  document.body.style.setProperty('--bg1', bg1);
  document.body.style.setProperty('--bg2', bg2);

  const today = new Date();
  const dateStr = today.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric', weekday: 'short' });
  const emoji = weatherEmoji(shared.weatherText);
  const tmax = shared.tmax !== null ? Math.round(shared.tmax) + '°' : '-';
  const tmin = shared.tmin !== null ? Math.round(shared.tmin) + '°' : '-';

  const cards = keys.map(k => {
    const d = cache[k] || {};
    const cur = (d.currentTemp !== null && d.currentTemp !== undefined) ? Math.round(d.currentTemp) : '--';
    const wind = (d.wind !== null && d.wind !== undefined) ? d.wind + ' m/s' : '-';
    const hum = (d.humidity !== null && d.humidity !== undefined) ? d.humidity + '%' : '-';
    return `<div class="mcard mcity">
      <div class="m-name">${CITIES[k].name}</div>
      <div class="m-temp">${cur}<span>°C</span></div>
      <div class="m-metrics">
        <div>風速<strong>${wind}</strong></div>
        <div>湿度<strong>${hum}</strong></div>
      </div>
    </div>`;
  }).join('');

  const precip = renderPopBlocks(shared.popBlocks, emoji);

  card.innerHTML = `
    <div class="mcard summary">
      <p class="city-name">香川県</p>
      <p class="date">${dateStr}</p>
      <div class="wicon">${weatherIcon(shared.weatherText)}</div>
      <p class="condition">${shared.weatherText || '不明'}</p>
      <div class="subrow">
        <div>最高<strong>${tmax}</strong></div>
        <div>最低<strong>${tmin}</strong></div>
      </div>
      ${precip}
    </div>
    <p class="day-header">市町村ごとの現在の観測</p>
    <div class="mgrid">${cards}</div>
  `;
  updatedEl.textContent = `更新: ${today.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })} (気象庁データ) ／ 天気・最高・最低・降水確率は香川県予報`;
}

// 今日の時間帯別（6時間ブロック）の降水確率を表示。JMAはこれが最も細かい時間別データ
function renderPopBlocks(popBlocks, dayEmoji) {
  if (!popBlocks || !popBlocks.length) return '';
  const todayStr = new Date().toLocaleDateString('sv-SE'); // YYYY-MM-DD
  const blocks = popBlocks.filter(b => b.time.slice(0, 10) === todayStr && b.pop !== null);
  if (!blocks.length) return '';
  const cells = blocks.map(b => {
    const start = new Date(b.time).getHours();
    const end = start + 6; // JMAの降水確率は各時刻から6時間ぶん
    return `<div class="hourly-cell">
      <div class="h-time">${start}〜${end}時</div>
      <div class="h-emoji">${popEmoji(b.pop, dayEmoji)}</div>
      <div class="h-pop">☂${b.pop}%</div>
    </div>`;
  }).join('');
  return `<p class="hourly-title">今日の時間帯別 降水確率</p><div class="hourly">${cells}</div>`;
}

fetchAll();
</script>
</body>
</html>
