<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天気予報</title>
<style>
  /* 天気で背景色を滑らかに変えるため、色をアニメ可能なカスタムプロパティにする */
  @property --bg1 { syntax: '<color>'; inherits: false; initial-value: #4facfe; }
  @property --bg2 { syntax: '<color>'; inherits: false; initial-value: #00c6fb; }
  :root {
    --card-bg: rgba(255, 255, 255, 0.92);
    --text-main: #1a1a2e;
    --text-sub: #555;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    --bg1: #4facfe;
    --bg2: #00c6fb;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    transition: --bg1 0.7s ease, --bg2 0.7s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .container {
    width: 100%;
    max-width: 440px;
  }
  /* PCなど広い画面では横に広げて市町村を3列に */
  @media (min-width: 760px) {
    .container { max-width: 880px; }
  }
  /* 市町村カードのグリッド: スマホ2列 → PC3列(3×2) */
  .mgrid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  @media (min-width: 760px) {
    .mgrid { grid-template-columns: repeat(3, 1fr); }
  }
  .mgrid .mcard { margin-bottom: 0; }
  .summary { text-align: center; }
  .day-header {
    text-align: center;
    color: rgba(255,255,255,0.95);
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 14px;
  }
  /* 市町村ごとのカード */
  .mcard {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 16px 18px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.18);
    backdrop-filter: blur(10px);
    margin-bottom: 12px;
    text-align: left;
  }
  .mcard-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .mcard .m-name {
    font-size: 20px;
    font-weight: 800;
    color: var(--text-main);
  }
  .mcard .m-cond {
    font-size: 12px;
    color: var(--text-sub);
    margin-top: 2px;
  }
  .mcard .m-icon { width: 58px; height: 58px; flex: 0 0 auto; }
  .mcard .m-icon .wi { width: 58px; height: 58px; }
  .mcard .m-temp {
    font-size: 40px;
    font-weight: 800;
    color: var(--text-main);
    line-height: 1;
    margin: 6px 0 12px;
  }
  .mcard .m-temp span { font-size: 20px; font-weight: 600; vertical-align: super; }
  .mcard .m-metrics {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    padding-top: 12px;
    border-top: 1px solid rgba(0,0,0,0.08);
  }
  .mcard .m-metrics > div {
    font-size: 12px;
    color: var(--text-sub);
  }
  .mcard .m-metrics strong {
    display: block;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-main);
    margin-top: 2px;
  }
  /* 市町村カード(グリッド内・コンパクト) */
  .mcity { padding: 14px 14px; }
  .mcity .m-name { font-size: 17px; }
  .mcity .m-temp { font-size: 34px; margin: 4px 0 10px; }
  .mcity .m-temp span { font-size: 17px; }
  .mcity .m-metrics { gap: 12px; }
  .card {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 32px 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    text-align: center;
    backdrop-filter: blur(10px);
  }
  .city-name {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-sub);
    margin: 0 0 4px;
  }
  .date {
    font-size: 13px;
    color: #999;
    margin: 0 0 16px;
  }
  .emoji {
    font-size: 88px;
    line-height: 1;
    margin: 8px 0;
  }
  /* アニメーション天気アイコン */
  .wicon { margin: 6px auto 4px; width: 108px; height: 108px; }
  .wi { width: 108px; height: 108px; display: block; }
  .wi .spin { animation: wi-spin 14s linear infinite; transform-box: fill-box; transform-origin: center; }
  .wi .pulse { animation: wi-pulse 3s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
  .wi .cloud { animation: wi-bob 4s ease-in-out infinite; }
  .wi .drop { animation: wi-fall 1.3s linear infinite; }
  .wi .bolt { animation: wi-flash 2.4s ease-in-out infinite; }
  .wi .flake { animation: wi-snow 2.4s linear infinite; transform-box: fill-box; transform-origin: center; }
  .wi .fogline { animation: wi-drift 3s ease-in-out infinite; }
  @keyframes wi-spin { to { transform: rotate(360deg); } }
  @keyframes wi-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.09); } }
  @keyframes wi-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  @keyframes wi-fall { 0% { transform: translateY(-3px); opacity: 0; } 25% { opacity: 1; } 100% { transform: translateY(12px); opacity: 0; } }
  @keyframes wi-flash { 0%,42%,58%,100% { opacity: .2; } 48%,52% { opacity: 1; } }
  @keyframes wi-snow { 0% { transform: translateY(-3px) rotate(0); opacity: 0; } 25% { opacity: 1; } 100% { transform: translateY(13px) rotate(160deg); opacity: 0; } }
  @keyframes wi-drift { 0%,100% { transform: translateX(-3px); } 50% { transform: translateX(3px); } }
  @media (prefers-reduced-motion: reduce) {
    .wi * { animation: none !important; }
  }
  .condition {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-main);
    margin: 4px 0 20px;
  }
  .temp {
    font-size: 64px;
    font-weight: 800;
    color: var(--text-main);
    line-height: 1;
    margin: 0;
  }
  .temp span {
    font-size: 32px;
    font-weight: 600;
    vertical-align: super;
  }
  .subrow {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid rgba(0,0,0,0.08);
  }
  .subrow div {
    font-size: 13px;
    color: var(--text-sub);
  }
  .subrow strong {
    display: block;
    font-size: 18px;
    color: var(--text-main);
    margin-top: 2px;
  }
  .hourly-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sub);
    margin: 22px 0 10px;
    text-align: left;
  }
  .hourly {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 6px;
    margin: 0 -4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }
  .hourly-cell {
    flex: 0 0 auto;
    min-width: 52px;
    text-align: center;
    padding: 8px 4px;
    border-radius: 12px;
    background: rgba(0,0,0,0.03);
  }
  .hourly-cell .h-time {
    font-size: 12px;
    color: var(--text-sub);
  }
  .hourly-cell .h-emoji {
    font-size: 24px;
    margin: 4px 0;
    line-height: 1;
  }
  .hourly-cell .h-emoji .wi { width:34px; height:34px; margin:0 auto; }
  .hourly-cell .h-temp {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-main);
  }
  .hourly-cell .h-pop {
    font-size: 10px;
    color: #4a90d9;
    margin-top: 2px;
  }
  .loading, .error {
    color: var(--text-sub);
    font-size: 15px;
    padding: 40px 0;
  }
  .error { color: #d63031; }
  .updated {
    text-align: center;
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    margin-top: 14px;
  }
  /* ===== 防災総合ページ用 ===== */
  .page-title { text-align:center; color:#fff; font-size:21px; font-weight:800; margin:0 0 2px; }
  .page-date { text-align:center; color:rgba(255,255,255,.9); font-size:13px; margin:0 0 16px; }
  .section-title { font-size:15px; font-weight:800; color:var(--text-main); margin:0 0 12px; }
  .section.alert { box-shadow:0 8px 30px rgba(231,76,60,.28); }
  .section.alert .section-title { color:#c0392b; }
  .ok-text { color:var(--text-sub); font-size:13px; margin:0; }
  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { padding:6px 12px; border-radius:999px; font-size:13px; font-weight:700; }
  .chip-warn { background:#ffe0e0; color:#c0392b; }
  .chip-ty { background:#ffe9d6; color:#c15600; }
  .warn-head { font-size:12px; color:#c0392b; margin:10px 0 0; line-height:1.5; }
  .sub-note { font-size:11px; color:#888; margin:8px 0 0; }
  .fc-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .fcard { text-align:center; background:rgba(0,0,0,.03); border-radius:14px; padding:12px 6px; }
  .fc-day { font-size:13px; font-weight:800; color:var(--text-main); }
  .fc-day span { display:block; font-size:10px; font-weight:600; color:#999; margin-top:1px; }
  .fc-icon { width:52px; height:52px; margin:6px auto 2px; }
  .fc-icon .wi { width:52px; height:52px; }
  .fc-wx { font-size:11px; color:var(--text-sub); line-height:1.3; min-height:29px; display:flex; align-items:center; justify-content:center; }
  .fc-pop { font-size:12px; color:#4a90d9; font-weight:700; margin-top:4px; }
  .fc-temp { font-size:13px; color:var(--text-sub); margin-top:4px; }
  .fc-temp b { color:#e0592a; font-size:15px; }
  .kv-row { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid rgba(0,0,0,.06); }
  .kv-row:last-child { border-bottom:none; }
  .kv-row span { font-size:13px; color:var(--text-sub); flex:0 0 auto; }
  .kv-row strong { font-size:14px; color:var(--text-main); text-align:right; }
  .quake-row { display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid rgba(0,0,0,.06); }
  .quake-row:last-child { border-bottom:none; }
  .q-int { flex:0 0 auto; min-width:58px; text-align:center; background:#eef2f7; border-radius:10px; padding:6px 4px; font-size:11px; color:var(--text-sub); }
  .q-int b { display:block; font-size:18px; font-weight:800; color:var(--text-main); }
  .q-place { font-size:14px; font-weight:700; color:var(--text-main); }
  .q-sub { font-size:11px; color:#888; margin-top:1px; }
  .pop-days { display:flex; flex-direction:column; gap:12px; }
  .pop-day-label { font-size:12px; font-weight:700; color:var(--text-sub); margin-bottom:6px; }
  /* 6時間ブロックは常に4列(各25%)。今日(3ブロック)は右端1枠が空く */
  .pop-days .hourly { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin:0; overflow:visible; }
  .pop-days .hourly-cell { min-width:0; }
  @media (min-width:760px) {
    .pop-days { flex-direction:row; flex-wrap:nowrap; align-items:stretch; gap:32px; }
    .pop-days .pop-day { flex:1; }
  }
  .wgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .wcell { text-align:center; background:rgba(0,0,0,.03); border-radius:12px; padding:10px 3px; }
  .w-day { font-size:12px; font-weight:700; color:var(--text-main); }
  .w-day span { font-size:10px; color:#999; }
  .w-icon { width:38px; height:38px; margin:4px auto 2px; }
  .w-icon .wi { width:38px; height:38px; }
  .w-pop { font-size:11px; color:#4a90d9; font-weight:700; }
  .w-temp { font-size:12px; color:var(--text-sub); margin-top:3px; line-height:1.35; }
  .w-temp b { color:#e0592a; }
  @media (max-width:600px) {
    .wcell { padding:8px 2px; }
    .wcell .w-day { font-size:11px; }
  }
</style>

</head>
<body>
<div class="container">
  <div id="card">
    <div class="mcard"><div class="loading">読み込み中...</div></div>
  </div>
  <div class="updated" id="updated"></div>
</div>

<script>
// 気象庁(JMA)公式データを使用。
// 天気・降水確率は香川県(370000)共通。気温は各市町村のアメダス地点から取得する。
const KAGAWA_FORECAST = '370000';
const CITIES = {
  takamatsu:     { name: '高松',   amedasId: '72086' }, // 高松
  marugame:      { name: '丸亀',   amedasId: '72111' }, // 多度津(丸亀の隣)
  ayagawa:       { name: '綾川',   amedasId: '72121' }, // 滝宮
  shodoshima:    { name: '小豆島', amedasId: '72061' }, // 内海
  mitoyo:        { name: '三豊',   amedasId: '72161' }, // 財田
  higashikagawa: { name: '東かがわ', amedasId: '72146' }, // 引田
};

// 降水確率から時間帯ブロックの絵文字を決める（天気は半日単位のため確率で補完）
// 降水確率から時間帯アイコン用の天気テキスト（アニメーションSVGに使う）
function popWeatherText(pop) {
  if (pop >= 70) return '雨';
  if (pop >= 40) return '晴れ一時雨';
  if (pop >= 20) return '晴れ時々くもり';
  return 'くもり';
}

function popEmoji(pop, dayEmoji) {
  if (pop >= 70) return '🌧️';
  if (pop >= 40) return '🌦️';
  if (pop >= 20) return '⛅';
  return dayEmoji;
}

function weatherEmoji(text) {
  if (!text) return '❓';
  if (text.includes('雷')) return '⛈️';
  if (text.includes('雪')) return '❄️';
  if (text.includes('雨') && text.includes('晴')) return '🌦️';
  if (text.includes('雨') && text.includes('くもり')) return '🌧️';
  if (text.includes('雨')) return '🌧️';
  if (text.includes('晴') && text.includes('くもり')) return '⛅';
  if (text.includes('晴')) return '☀️';
  if (text.includes('くもり')) return '☁️';
  if (text.includes('霧')) return '🌫️';
  return '❓';
}

// アニメーション天気アイコン（SVG + CSS）用パーツ
const SVG_SUN = `<g class="spin"><g stroke="#FFB300" stroke-width="5" stroke-linecap="round">
  <line x1="54" y1="19" x2="54" y2="8"/><line x1="73.1" y1="26.9" x2="80.9" y2="19.1"/>
  <line x1="81" y1="46" x2="92" y2="46"/><line x1="73.1" y1="65.1" x2="80.9" y2="72.9"/>
  <line x1="54" y1="73" x2="54" y2="84"/><line x1="34.9" y1="65.1" x2="27.1" y2="72.9"/>
  <line x1="27" y1="46" x2="16" y2="46"/><line x1="34.9" y1="26.9" x2="27.1" y2="19.1"/>
</g></g><circle class="pulse" cx="54" cy="46" r="17" fill="#FFD54F"/>`;
const SVG_CLOUD = `<g class="cloud" fill="#e6ecf3">
  <ellipse cx="40" cy="60" rx="18" ry="15"/><ellipse cx="64" cy="56" rx="21" ry="18"/>
  <rect x="30" y="58" width="50" height="18" rx="9"/></g>`;
const SVG_RAIN = `<g stroke="#4a90d9" stroke-width="4" stroke-linecap="round">
  <line class="drop" x1="43" y1="80" x2="41" y2="88" style="animation-delay:0s"/>
  <line class="drop" x1="55" y1="80" x2="53" y2="88" style="animation-delay:.45s"/>
  <line class="drop" x1="67" y1="80" x2="65" y2="88" style="animation-delay:.9s"/></g>`;
const SVG_BOLT = `<polygon class="bolt" fill="#FFC107" points="56,72 44,92 53,92 47,104 68,84 58,84 63,72"/>`;
const SVG_SNOW = `<g fill="#eaf2ff">
  <circle class="flake" cx="42" cy="82" r="3.5" style="animation-delay:0s"/>
  <circle class="flake" cx="55" cy="82" r="3.5" style="animation-delay:.7s"/>
  <circle class="flake" cx="68" cy="82" r="3.5" style="animation-delay:1.3s"/></g>`;
const SVG_FOG = `<g class="cloud" fill="#e6ecf3"><ellipse cx="54" cy="48" rx="27" ry="18"/></g>
  <g stroke="#cfd8e3" stroke-width="5" stroke-linecap="round">
  <line class="fogline" x1="30" y1="76" x2="78" y2="76" style="animation-delay:0s"/>
  <line class="fogline" x1="34" y1="88" x2="74" y2="88" style="animation-delay:.6s"/></g>`;
const SUN_BEHIND = `<g transform="translate(-8,-14) scale(.62)">${SVG_SUN}</g>`;

// 天気テキスト → 背景グラデーション [上色, 下色]。白文字が読める中間トーンに調整
function weatherBg(text) {
  const t = text || '';
  if (t.includes('雷')) return ['#3a4453', '#59616e'];
  if (t.includes('雪')) return ['#6f94bb', '#a3c0d8'];
  if (t.includes('雨') && t.includes('晴')) return ['#5b7fa6', '#87a7c4'];
  if (t.includes('雨')) return ['#4b6373', '#6b8494'];
  if (t.includes('晴') && t.includes('くもり')) return ['#5b93c9', '#8fb8d8'];
  if (t.includes('晴')) return ['#2b8fe0', '#6fd0f5'];
  if (t.includes('くもり')) return ['#7d8a99', '#a7b3bf'];
  if (t.includes('霧')) return ['#87939d', '#aeb9c2'];
  return ['#4facfe', '#00c6fb'];
}

function weatherIcon(text) {
  const t = text || '';
  let body;
  if (t.includes('雷')) body = SVG_CLOUD + SVG_BOLT;
  else if (t.includes('雪')) body = SVG_CLOUD + SVG_SNOW;
  else if (t.includes('雨') && t.includes('晴')) body = SUN_BEHIND + SVG_CLOUD + SVG_RAIN;
  else if (t.includes('雨')) body = SVG_CLOUD + SVG_RAIN;
  else if (t.includes('晴') && t.includes('くもり')) body = SUN_BEHIND + SVG_CLOUD;
  else if (t.includes('晴')) body = SVG_SUN;
  else if (t.includes('くもり')) body = SVG_CLOUD;
  else if (t.includes('霧')) body = SVG_FOG;
  else body = SVG_CLOUD;
  return `<svg class="wi" viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg">${body}</svg>`;
}

const card = document.getElementById('card');
const updatedEl = document.getElementById('updated');
const cache = {};

async function fetchAmedasLatestFile() {
  const res = await fetch('https://www.jma.go.jp/bosai/amedas/data/latest_time.txt');
  if (!res.ok) throw new Error('アメダス最新時刻の取得に失敗');
  const text = (await res.text()).trim();
  const compact = text.split('+')[0].replace(/[-T:]/g, '');
  return `https://www.jma.go.jp/bosai/amedas/data/map/${compact}.json`;
}

// ---- 気象庁 天気コード → 文言 (telopが無いため主要コードを内蔵。未知は先頭桁で判定) ----
const WCODE = {
  '100':'晴れ','101':'晴れ時々くもり','102':'晴れ一時雨','103':'晴れ時々雨','104':'晴れ一時雪','105':'晴れ時々雪',
  '110':'晴れ後くもり','111':'晴れ後くもり','112':'晴れ後一時雨','113':'晴れ後時々雨','114':'晴れ後雨','115':'晴れ後一時雪','117':'晴れ後雪',
  '200':'くもり','201':'くもり時々晴れ','202':'くもり一時雨','203':'くもり時々雨','204':'くもり一時雪','205':'くもり時々雪',
  '206':'くもり後雨','208':'くもり後雨で雷を伴う','209':'くもり','210':'くもり後晴れ','211':'くもり後晴れ','212':'くもり後一時雨','213':'くもり後時々雨','214':'くもり後雨','215':'くもり後雪',
  '300':'雨','301':'雨時々晴れ','302':'雨時々くもり','303':'雨時々雪','304':'雨か雪','306':'大雨','308':'雨で暴風を伴う','311':'雨後晴れ','313':'雨後くもり','314':'雨後時々雪','315':'雨後雪',
  '400':'雪','401':'雪時々晴れ','402':'雪時々くもり','403':'雪時々雨','406':'大雪','411':'雪後晴れ','413':'雪後くもり','414':'雪後雨',
};
function jmaWeatherText(code) {
  if (WCODE[code]) return WCODE[code];
  const c = String(code || '')[0];
  return c === '1' ? '晴れ' : c === '2' ? 'くもり' : c === '3' ? '雨' : c === '4' ? '雪' : '不明';
}

// ---- 警報・注意報コード → 名称 ----
const WARNING_NAMES = {
  '02':'暴風雪警報','03':'大雨警報','04':'洪水警報','05':'暴風警報','06':'大雪警報','07':'波浪警報','08':'高潮警報',
  '10':'大雨注意報','12':'大雪注意報','13':'風雪注意報','14':'雷注意報','15':'強風注意報','16':'波浪注意報','17':'融雪注意報',
  '18':'洪水注意報','19':'高潮注意報','20':'濃霧注意報','21':'乾燥注意報','22':'なだれ注意報','23':'低温注意報','24':'霜注意報','25':'着氷注意報','26':'着雪注意報',
  '32':'特別警報','33':'大雨特別警報','35':'暴風特別警報','36':'大雪特別警報','37':'波浪特別警報','38':'高潮特別警報',
};

const JMA = 'https://www.jma.go.jp/bosai';

function toDateKey(d) { return d.toLocaleDateString('sv-SE'); } // YYYY-MM-DD (ローカル)

function parseForecast(fjson) {
  const short = fjson[0], weekly = fjson[1];
  const s0 = short.timeSeries[0], s1 = short.timeSeries[1], s2 = short.timeSeries[2];
  const a0 = s0.areas[0];
  const wk0 = weekly.timeSeries[0], wk1 = weekly.timeSeries[1];

  const wx = {};   // date -> {text}
  s0.timeDefines.forEach((t, i) => { wx[t.slice(0,10)] = { text: a0.weathers[i] }; });
  wk0.timeDefines.forEach((t, i) => { const dk = t.slice(0,10); if (!wx[dk]) wx[dk] = { text: jmaWeatherText(wk0.areas[0].weatherCodes[i]) }; });

  const pop = {};  // date -> 最大降水確率
  s1.timeDefines.forEach((t, i) => { const dk = t.slice(0,10), v = s1.areas[0].pops[i]; if (v !== '') pop[dk] = Math.max(pop[dk] ?? 0, Number(v)); });
  wk0.timeDefines.forEach((t, i) => { const dk = t.slice(0,10), v = wk0.areas[0].pops[i]; if (pop[dk] === undefined && v !== '') pop[dk] = Number(v); });

  const temp = {}; // date -> {max,min}
  s2.timeDefines.forEach((t, i) => { const dk = t.slice(0,10), v = s2.areas[0].temps[i]; if (v !== '') { const n = Number(v); temp[dk] = temp[dk] || {}; temp[dk].max = Math.max(temp[dk].max ?? -99, n); temp[dk].min = Math.min(temp[dk].min ?? 99, n); } });
  wk1.timeDefines.forEach((t, i) => { const dk = t.slice(0,10), mx = wk1.areas[0].tempsMax[i], mn = wk1.areas[0].tempsMin[i]; if (mx !== '' || mn !== '') { temp[dk] = temp[dk] || {}; if (mx !== '') temp[dk].max = Number(mx); if (mn !== '') temp[dk].min = Number(mn); } });

  const wave = {}; // date -> text (今日明日のみ)
  s0.timeDefines.forEach((t, i) => { wave[t.slice(0,10)] = a0.waves[i]; });

  const wk = ['日','月','火','水','木','金','土'];
  const base = new Date();
  const days = [0,1,2].map(off => {
    const d = new Date(base); d.setDate(base.getDate() + off);
    const dk = toDateKey(d);
    const tt = temp[dk] || {};
    return {
      label: ['今日','明日','明後日'][off],
      dateKey: dk,
      mmdd: `${d.getMonth()+1}/${d.getDate()}`, weekday: wk[d.getDay()],
      weatherText: (wx[dk] && wx[dk].text) || '不明',
      pop: pop[dk] !== undefined ? pop[dk] : null,
      tmax: tt.max !== undefined ? tt.max : null,
      tmin: tt.min !== undefined ? tt.min : null,
      wave: wave[dk] || null,
    };
  });

  const popBlocks = s1.timeDefines.map((t, i) => ({ time: t, pop: s1.areas[0].pops[i] === '' ? null : Number(s1.areas[0].pops[i]) }));

  // 週間予報（7日分）。今日・明日の空欄は短期予報の値で補完
  const dmap = {}; days.forEach(d => { dmap[d.dateKey] = d; });
  const numOr = v => (v === '' || v === undefined) ? null : Number(v);
  const weeklyList = wk0.timeDefines.map((t, i) => {
    const dk = t.slice(0, 10); const d = new Date(dk + 'T00:00:00');
    const wd = {
      dateKey: dk, mmdd: `${d.getMonth()+1}/${d.getDate()}`, weekday: wk[d.getDay()],
      weatherText: jmaWeatherText(wk0.areas[0].weatherCodes[i]),
      pop: numOr(wk0.areas[0].pops[i]),
      tmax: numOr(wk1.areas[0].tempsMax[i]),
      tmin: numOr(wk1.areas[0].tempsMin[i]),
    };
    const dd = dmap[dk];
    if (dd) { if (wd.pop == null) wd.pop = dd.pop; if (wd.tmax == null) wd.tmax = dd.tmax; if (wd.tmin == null) wd.tmin = dd.tmin; }
    return wd;
  });
  return { days, popBlocks, weekly: weeklyList };
}

function parseWarnings(w) {
  if (!w) return { headline: '', active: [] };
  const found = new Map();
  (w.areaTypes || []).forEach(at => (at.areas || []).forEach(ar => (ar.warnings || []).forEach(wn => {
    if (wn.code && wn.code !== '00' && wn.status && wn.status !== '解除') found.set(wn.code, WARNING_NAMES[wn.code] || ('コード' + wn.code));
  })));
  return { headline: (w.headlineText || '').trim(), active: [...found.values()] };
}

function parseTyphoons(t) {
  if (!Array.isArray(t) || !t.length) return [];
  return t.map(x => {
    const num = x.typhoonNumber ? parseInt(x.typhoonNumber.slice(-2), 10) : null;
    const isTy = ['TY','STS','TS'].includes(x.category);
    return { label: (isTy && num) ? `台風${num}号` : (x.category === 'TD' ? '熱帯低気圧' : `熱帯擾乱 ${x.typhoonNumber || ''}`) };
  });
}

function parseQuakes(q) {
  if (!Array.isArray(q)) return [];
  return q.filter(e => e.anm && e.at && (e.ttl || '').includes('震')).slice(0, 4).map(e => {
    const dt = new Date(e.at);
    const time = `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    return { time, place: e.anm, mag: e.mag || '', maxi: e.maxi || '' };
  });
}

async function fetchAll() {
  try {
    const [fRes, wRes, tRes, qRes, amedasUrl] = await Promise.all([
      fetch(`${JMA}/forecast/data/forecast/${KAGAWA_FORECAST}.json`),
      fetch(`${JMA}/warning/data/warning/${KAGAWA_FORECAST}.json`).catch(() => null),
      fetch(`${JMA}/typhoon/data/targetTc.json`).catch(() => null),
      fetch(`${JMA}/quake/data/list.json`).catch(() => null),
      fetchAmedasLatestFile().catch(() => null),
    ]);
    if (!fRes || !fRes.ok) throw new Error('予報データの取得に失敗');
    cache.forecast = parseForecast(await fRes.json());
    cache.warnings = parseWarnings(wRes && wRes.ok ? await wRes.json() : null);
    cache.typhoons = parseTyphoons(tRes && tRes.ok ? await tRes.json() : null);
    cache.quakes = parseQuakes(qRes && qRes.ok ? await qRes.json() : null);

    let amedasMap = null;
    if (amedasUrl) { try { const ar = await fetch(amedasUrl); if (ar.ok) amedasMap = await ar.json(); } catch (e) {} }
    const num = a => (Array.isArray(a) && typeof a[0] === 'number') ? a[0] : null;
    cache.obs = {};
    Object.keys(CITIES).forEach(k => {
      const st = amedasMap && amedasMap[CITIES[k].amedasId];
      cache.obs[k] = { temp: st ? num(st.temp) : null, wind: st ? num(st.wind) : null, hum: st ? num(st.humidity) : null };
    });
    renderAll();
  } catch (e) {
    card.innerHTML = `<div class="mcard"><div class="error">情報の取得に失敗しました<br>${e.message}</div></div>`;
  }
}

function sectionCard(title, body, cls) {
  return `<div class="mcard section ${cls || ''}"><p class="section-title">${title}</p>${body}</div>`;
}

function threeDaySection(days) {
  const cards = days.map(d => {
    const pop = d.pop != null ? d.pop + '%' : '-';
    const tmax = d.tmax != null ? Math.round(d.tmax) + '°' : '-';
    const tmin = d.tmin != null ? Math.round(d.tmin) + '°' : '-';
    return `<div class="fcard">
      <div class="fc-day">${d.label}<span>${d.mmdd}(${d.weekday})</span></div>
      <div class="fc-icon">${weatherIcon(d.weatherText)}</div>
      <div class="fc-wx">${d.weatherText}</div>
      <div class="fc-pop">☂ ${pop}</div>
      <div class="fc-temp"><b>${tmax}</b> / ${tmin}</div>
    </div>`;
  }).join('');
  return sectionCard('📅 今日・明日・明後日の天気', `<div class="fc-grid">${cards}</div>`);
}

function weeklySection(weekly) {
  const rest = (weekly || []).slice(3); // 今日・明日・明後日は上の項目と重複するため除外
  if (!rest.length) return '';
  const cells = rest.map(d => {
    const pop = d.pop != null ? d.pop + '%' : '-';
    const tmax = d.tmax != null ? Math.round(d.tmax) + '°' : '-';
    const tmin = d.tmin != null ? Math.round(d.tmin) + '°' : '-';
    return `<div class="wcell">
      <div class="w-day">${d.mmdd}<span>(${d.weekday})</span></div>
      <div class="w-icon">${weatherIcon(d.weatherText)}</div>
      <div class="w-pop">☂${pop}</div>
      <div class="w-temp"><b>${tmax}</b><br>${tmin}</div>
    </div>`;
  }).join('');
  return sectionCard('🗓️ 週間予報（4日目以降）', `<div class="wgrid">${cells}</div>`);
}

function popBlocksHtml(popBlocks, days) {
  if (!popBlocks || !popBlocks.length) return '';
  const today = new Date().toLocaleDateString('sv-SE');
  const tmr = new Date(Date.now() + 86400000).toLocaleDateString('sv-SE');
  const wk = ['日','月','火','水','木','金','土'];
  const groups = {};
  popBlocks.forEach(b => { if (b.pop === null) return; const dk = b.time.slice(0, 10); (groups[dk] = groups[dk] || []).push(b); });
  let html = Object.keys(groups).sort().map(dk => {
    const d = new Date(dk + 'T00:00:00');
    const label = dk === today ? '今日' : dk === tmr ? '明日' : `${d.getMonth()+1}/${d.getDate()}(${wk[d.getDay()]})`;
    const cells = groups[dk].map(b => {
      const start = new Date(b.time).getHours(), end = start + 6;
      return `<div class="hourly-cell"><div class="h-time">${start}〜${end}時</div><div class="h-emoji">${weatherIcon(popWeatherText(b.pop))}</div><div class="h-pop">☂${b.pop}%</div></div>`;
    }).join('');
    return `<div class="pop-day"><div class="pop-day-label">${label}</div><div class="hourly">${cells}</div></div>`;
  }).join('');
  return `<div class="pop-days">${html}</div>`;
}

function municipalitySection() {
  const cards = Object.keys(CITIES).map(k => {
    const d = cache.obs[k] || {};
    const cur = d.temp != null ? Math.round(d.temp) : '--';
    const wind = d.wind != null ? d.wind + ' m/s' : '-';
    const hum = d.hum != null ? d.hum + '%' : '-';
    return `<div class="mcard mcity">
      <div class="m-name">${CITIES[k].name}</div>
      <div class="m-temp">${cur}<span>°C</span></div>
      <div class="m-metrics">
        <div>風速<strong>${wind}</strong></div>
        <div>湿度<strong>${hum}</strong></div>
      </div>
    </div>`;
  }).join('');
  return `<p class="day-header">🌡️ 市町村ごとの現在の観測（気温・風速・湿度）</p><div class="mgrid">${cards}</div>`;
}

function waveSection(days) {
  const rows = days.filter(d => d.wave).map(d => `<div class="kv-row"><span>${d.label}</span><strong>${d.wave}</strong></div>`).join('');
  return sectionCard('🌊 波浪情報（香川県）', rows || '<p class="ok-text">情報がありません</p>');
}

function warningSection() {
  const w = cache.warnings || { active: [], headline: '' };
  const body = w.active.length
    ? `<div class="chips">${w.active.map(n => `<span class="chip chip-warn">${n}</span>`).join('')}</div>${w.headline ? `<p class="warn-head">${w.headline}</p>` : ''}`
    : '<p class="ok-text">✓ 現在、発表されている警報・注意報はありません</p>';
  return sectionCard('⚠️ 警報・注意報（香川県）', body, w.active.length ? 'alert' : '');
}

function typhoonSection() {
  const ts = cache.typhoons || [];
  const body = ts.length
    ? `<div class="chips">${ts.map(t => `<span class="chip chip-ty">${t.label}</span>`).join('')}</div><p class="sub-note">発生中。進路など詳細は気象庁の台風情報をご確認ください。</p>`
    : '<p class="ok-text">✓ 現在、台風の情報はありません</p>';
  return sectionCard('🌀 台風情報', body, ts.length ? 'alert' : '');
}

function quakeSection() {
  const qs = cache.quakes || [];
  const body = qs.length
    ? qs.map(q => `<div class="quake-row"><div class="q-int">震度<b>${q.maxi || '-'}</b></div><div><div class="q-place">${q.place}</div><div class="q-sub">${q.time}${q.mag ? ' ・ M' + q.mag : ''}</div></div></div>`).join('')
    : '<p class="ok-text">最近の地震情報はありません</p>';
  return sectionCard('🌍 最近の地震情報（全国）', body);
}

function renderAll() {
  const f = cache.forecast;
  if (!f) { card.innerHTML = `<div class="mcard"><div class="error">予報データを取得できませんでした</div></div>`; return; }
  const today = f.days[0];

  const [bg1, bg2] = weatherBg(today.weatherText);
  document.body.style.setProperty('--bg1', bg1);
  document.body.style.setProperty('--bg2', bg2);

  const now = new Date();
  const dateStr = now.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric', weekday: 'short' });
  const precip = popBlocksHtml(f.popBlocks, f.days);

  card.innerHTML = `
    <p class="page-title">香川県の天気・防災情報</p>
    <p class="page-date">${dateStr} 現在</p>
    ${warningSection()}
    ${threeDaySection(f.days)}
    ${precip ? sectionCard('☔ 時間帯別 降水確率（今日・明日）', precip) : ''}
    ${weeklySection(f.weekly)}
    ${municipalitySection()}
    ${waveSection(f.days)}
    ${typhoonSection()}
    ${quakeSection()}
  `;
  updatedEl.textContent = `更新: ${now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })} ／ 出典: 気象庁（天気・降水・最高最低・波浪は香川県予報、気温観測は各アメダス地点）`;
}

fetchAll();
</script>
</body>
</html>
